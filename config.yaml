seed: 42

seasons:
  train: [2022, 2023, 2024]
  holdout: 2025

paths:
  statcast_dir: /Users/jweinga/Documents/python/punchoutpredictor/data/statcast  # fallback; STATCAST_PATH env wins
  raw_dir: data/raw
  results_dir: results

season_windows:            # expected regular-season date range per season
  2022: ["2022-04-07", "2022-10-05"]
  2023: ["2023-03-30", "2023-10-01"]
  2024: ["2024-03-20", "2024-09-30"]
  2025: ["2025-03-18", "2025-09-28"]

sprint_speed:
  min_opp: 10

model:
  stages:
    A: {subsample: 5000,   m_trees: 20, tune: 200, draws: 200, chains: 2, store_p: true,  predict_cap: 20000}
    B: {subsample: 50000,  m_trees: 50, tune: 500, draws: 500, chains: 2, store_p: false, predict_cap: null}
    C: {subsample: 100000, m_trees: 50, tune: 500, draws: 500, chains: 2, store_p: false, predict_cap: null}
    # Stage C: set subsample to null for all training rows (requires user sign-off on runtime).

rollup:
  thin_draws: 500
  chunk_size: 20000

evaluate:
  min_pa: 100
  reliability_bins: 10
  sprint_grid: [23.0, 31.0, 17]   # ft/s: min, max, n points
